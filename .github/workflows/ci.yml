name: build-and-lint

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v3

      - name: set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: install backend dependencies
        working-directory: chicken_farm_backend
        run: npm ci

      - name: lint backend
        working-directory: chicken_farm_backend
        run: npm run lint -- --max-warnings=0

      - name: install frontend dependencies
        working-directory: chicken_farm_frontend
        run: npm ci

      - name: lint frontend
        working-directory: chicken_farm_frontend
        run: npm run lint -- --max-warnings=0

      # Fixed indentation for these last two steps:
      - name: build backend image
        working-directory: ./chicken_farm_backend
        run: docker build -t chicken-farm-backend .

      - name: build frontend image
        working-directory: ./chicken_farm_frontend
        run: docker build -t chicken-farm-frontend .
