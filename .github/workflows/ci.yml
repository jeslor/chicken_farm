name: build-and-lint

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      # checkout the repository to the runner
      - name: checkout repository
        uses: actions/checkout@v3

      # set up Node.js for both backend and frontend
      - name: set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: install backend dependencies
        working-directory: chicken_farm_backend
        run: npm ci

      - name: lint backend
        working-directory: chicken_farm_backend
        run: npm run lint -- --max-warnings=0

      - name: install frontend dependencies
        working-directory: chicken_farm_frontend
        run: npm ci

      - name: lint frontend
        working-directory: chicken_farm_frontend
        run: npm run lint -- --max-warnings=0

      # Fixed indentation for these last two steps:
      - name: build backend image
        working-directory: ./chicken_farm_backend
        run: docker build -t chicken-farm-backend .

      - name: build frontend image
        working-directory: ./chicken_farm_frontend
        run: docker build -t chicken-farm-frontend .

  deploy:
    needs: build-and-lint
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy app on ec2 instance
        run: echo "Deploying app on EC2 instance..."

      - name: checkout (optional, if you need to pull deployment scripts from the repo)
        uses: actions/checkout@v4

      # Add deployment steps here, such as SSH into EC2 and run deployment scripts
      - name: Add EC2 host to known hosts
        # This step ensures that the EC2 host is added to the known_hosts file to avoid SSH warnings
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts
        # Use secrets to pass EC2_HOST securely
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}

      # This step writes the SSH private key to a file and sets the appropriate permissions
      - name: Write SSH private key to file
        # This step is crucial for SSH authentication. It takes the private key stored in GitHub Secrets and writes it to a file named ec2_key.pem, then sets the file permissions to read-only for the owner.
        run: |
          echo "${{ secrets.EC2_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

        # Use secrets to pass EC2_KEY securely
        env:
          # Make sure to add EC2_KEY in your GitHub repository secrets, containing the private key for SSH access to your EC2 instance.
          EC2_KEY: ${{ secrets.EC2_KEY }}

      # This step SSHs into the EC2 instance, navigates to the application directory, pulls the latest code
      #from the main branch, and then runs docker compose to build and restart the application. It also prunes
      #unused Docker images to free up space.
      - name: Deploy on EC2 (git pull + docker compose up -d --build)
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_APP_DIR: ${{ secrets.EC2_APP_DIR }}

        # The SSH command is wrapped in a here-document (EOF) to allow for multiple commands to be executed on the
        # remote EC2 instance in a single SSH session. The set -e command ensures that if any command fails, the entire
        #script will exit with an error, preventing further commands from running and potentially causing issues on the remote server.
        run: |
          ssh -i ec2_key.pem ${EC2_USER}@${EC2_HOST} <<EOF
            set -e
            # Check if the application directory exists before trying to navigate into it
            if [ ! -d "${EC2_APP_DIR}" ]; then
              echo "Error: Directory ${EC2_APP_DIR} not found on remote host."
              exit 1
            fi
            cd ${EC2_APP_DIR}

            git fetch --all
            git reset --hard origin/main

            docker compose up -d --build

            docker image prune -f
            docker compose ps
          EOF
